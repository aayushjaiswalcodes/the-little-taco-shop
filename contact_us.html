<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <header>
      <h1>Contact Us</h1>
      <nav>
        <ul>
          <li>
            <a href="index.html">Home</a>
          </li>
          <li>
            <a href="./index.html#aboutlts">About LTS</a>
          </li>
          <li>
            <a href="./index.html#ourmenu">Our Menu</a>
          </li>
          <li>
            <a href="store_hours.html">Store Hours</a>
          </li>
        </ul>
      </nav>
      <figure>
        <img
          src="images/tacos_close_up_400x260.png"
          alt="tacos-close-up-image"
          height="260"
          width="400"
        />
        <figcaption>Little Taco Shop Tacos</figcaption>
      </figure>
    </header>
    <main>
      <article id="form">
        <h2>Our Contact Form</h2>
        <form action="https://httpbin.org/get" method="get">
          <fieldset>
            <legend>Send Us A Message</legend>
            <label for="name">Name:</label>
            <input
              type="text"
              name="name"
              id="name"
              placeholder="your name"
              autocomplete="on"
              required
            />
            <br />
            <label for="email">Email:</label>
            <input
              type="text"
              name="email"
              id="email"
              placeholder="your email"
              autocomplete="on"
            />
            <br />
            <p>Your Message:</p>
            <label for="message"></label>
            <textarea
              name="message"
              id="message"
              cols="30"
              rows="10"
              placeholder="type your message here"
            ></textarea>
          </fieldset>
          <button type="submit">Send</button>
          <button type="reset">Reset</button>
        </form>
      </article>
    </main>
    <footer>
      <h2>Our Location</h2>
      <address>
        <p>
          555 Taco Temptation Lane, Suite T <br />Kansas City, MO 55555-55555
        </p>
        <p>Phone:<a href="tel:+915555555555">555-555-5555</a></p>
      </address>
      <a href="#">Back to top</a>
      <hr />
      <p>Copyright &copy; The Little Taco Shop</p>
    </footer>
  </body>
</html>
